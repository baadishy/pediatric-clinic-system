<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Pediatric Clinic - عيادة الأطفال</title>
  <style>
    body {
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc; /* Slate 50 */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 450px;
      padding: 20px;
    }
    .logo-container {
      margin-bottom: 24px;
    }
    .logo-pulse {
      font-size: 4rem;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 8px;
      color: #38bdf8; /* Sky 400 */
      letter-spacing: -0.025em;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #94a3b8; /* Slate 400 */
      margin-top: 0;
      margin-bottom: 32px;
    }
    .status-panel {
      background-color: rgba(30, 41, 59, 0.5); /* Slate 800 with opacity */
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .spinner {
      border: 3px solid rgba(56, 189, 248, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #38bdf8;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px auto;
    }
    .status-text {
      font-size: 0.95rem;
      color: #cbd5e1; /* Slate 300 */
      margin-bottom: 4px;
    }
    .info-subtext {
      font-size: 0.8rem;
      color: #64748b; /* Slate 500 */
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <span class="logo-pulse">🩺</span>
    </div>
    <h1>جاري تشغيل النظام...</h1>
    <h2>عيادة الأطفال - Pediatric Clinic</h2>
    
    <div class="status-panel">
      <div class="spinner"></div>
      <div class="status-text" id="status">تحميل قاعدة البيانات المحلية والمحرك الأساسي...</div>
      <div class="info-subtext">قد يستغرق التشغيل الأول بضع ثوانٍ لتأمين اتصالات الأجهزة.</div>
    </div>
  </div>
</body>
</html>
